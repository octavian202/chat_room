<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>client</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('root');
        if (el && !el.hasChildNodes()) {
          el.innerHTML = '<div style="padding: 2rem; font-family: sans-serif; color: #f87171;"><h2>Error loading app</h2><pre style="white-space: pre-wrap; background: #1a1a1a; padding: 1rem; border-radius: 8px; overflow: auto;">' + (e.message || e) + '</pre><p>Check the browser console for details.</p></div>';
        }
      });
    </script>
  </body>
</html>
